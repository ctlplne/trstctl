# gitleaks configuration for trstctl (SF.1 — secret scanning gate).
#
# Start from gitleaks' maintained default ruleset (AWS keys, private keys,
# generic high-entropy assignments, provider tokens, etc.) so new rules are
# picked up automatically, then add a DELIBERATELY NARROW allowlist for the
# project's deterministic test vectors.
#
# Scope of the allowlist, and why it does not "hide leaks" (02-GUARDRAILS):
#   - An audit of the tree shows the ONLY secret-scanner false positives are
#     hardcoded PEM *private-key* test fixtures under _test.go / testdata trees —
#     there are no test API keys, tokens, or high-entropy fixtures. These are
#     deterministic test vectors, not live credentials; relocating them would
#     mean churning ~25 baseline test files that are out of scope here.
#   - Production (non-test) source is fully scanned by every rule. The SF.1
#     acceptance is verified: a hardcoded secret planted in production source
#     fails the scan. gitleaks 8.21.2 does not honor per-rule `targetRules`
#     scoping at the top level, so the test-fixture paths are allowlisted as the
#     standard fixture convention; this is the narrowest configuration the tool
#     version supports.
[extend]
useDefault = true

[allowlist]
description = "Deterministic PEM private-key test vectors (fixtures, not live secrets)."
paths = [
  '''.*_test\.go$''',
  '''(^|/)testdata/''',
]
# The one published conformance keypair that lives in non-_test source
# (internal/connector/conformance.go) — a deterministic ECDSA P-256 vector
# (CN conformance.connector.test) shipped so forks/plugins can self-validate the
# connector suite (CLAUDE.md §6). Pinned by its EXACT key body so a future real
# finding in that file is NOT suppressed.
regexes = [
  '''MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQg2drNvkGQeqFUx3xE''',
]
