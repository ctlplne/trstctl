{{- include "trstctl.signer.guardMode" . -}}
{{- if and (eq .Values.signer.mode "isolated") .Values.networkPolicy.enabled }}
# S15.1 / AN-4 / SIGNER-005: the signer's process isolation becomes pod +
# network-policy isolation in Kubernetes. Default-deny; only the control plane may
# reach the signer's mTLS port (9443), and the signer may egress only to DNS and
# the external KMS. Rendered only in isolated mode.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "trstctl.fullname" . }}-signer
  labels:
    {{- include "trstctl.signerLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "trstctl.signerSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "trstctl.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9443
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 443
{{- end }}
