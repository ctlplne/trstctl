apiVersion: v1
kind: Service
metadata:
  name: {{ include "trstctl.fullname" . }}
  labels:
    {{- include "trstctl.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "trstctl.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
    {{- if .Values.agentChannel.enabled }}
    # Served agent steady-state mTLS gRPC channel (WIRE-004 / OPS-005): the control
    # plane exposes :9443 (default) so enrolled agents reach the heartbeat + renewal
    # channel. This is the agent ingress the fleet manifests (DaemonSet / Windows MSI)
    # point agents at; it is distinct from the SIGNER's :9443 (which exists only under
    # the isolated-signer topology and admits only the control plane). Off by default.
    - name: agent-grpc
      port: {{ .Values.agentChannel.servicePort }}
      targetPort: agent-grpc
      protocol: TCP
    {{- end }}
