{{- include "trstctl.signer.guardMode" . -}}
{{- if eq .Values.signer.mode "isolated" }}
# SIGNER-005 / S15.1: the in-cluster Service the control plane dials over mTLS to
# reach the isolated signer pod (signer.mtls_address). Rendered only in isolated
# mode; the default sidecar topology reaches the signer over an in-memory UDS.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "trstctl.fullname" . }}-signer
  labels:
    {{- include "trstctl.signerLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "trstctl.signerSelectorLabels" . | nindent 4 }}
  ports:
    - name: grpc-mtls
      port: 9443
      targetPort: grpc-mtls
{{- end }}
