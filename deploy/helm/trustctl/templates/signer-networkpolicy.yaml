{{- include "trustctl.signer.guardMode" . -}}
{{- if and (eq .Values.signer.mode "isolated") .Values.networkPolicy.enabled }}
# S15.1 / AN-4: the signer's process isolation becomes pod + network-policy
# isolation in Kubernetes. Default-deny; only the control plane may reach it, and
# it may egress only to DNS and the external KMS.
# OPS-001: gated off via trustctl.signer.guardMode (isolated topology not yet
# implemented; see signer-deployment.yaml and docs/limitations.md).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "trustctl.fullname" . }}-signer
  labels:
    {{- include "trustctl.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "trustctl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: signer
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "trustctl.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: control-plane
      ports:
        - protocol: TCP
          port: 9443
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 443
{{- end }}
