apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: trustctlcontrolplanes.trustctl.io
spec:
  group: trustctl.io
  scope: Namespaced
  names:
    kind: TrustctlControlPlane
    plural: trustctlcontrolplanes
    singular: trustctlcontrolplane
    shortNames: ["tcp"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                  minimum: 1
                image:
                  type: string
                signerMode:
                  type: string
                  enum: ["sidecar", "isolated"]
                postgres:
                  type: object
                  properties:
                    dsnSecret:
                      type: string
                nats:
                  type: object
                  properties:
                    url:
                      type: string
                externalKMS:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    provider:
                      type: string
                    keyRef:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                readySurfaces:
                  type: integer
