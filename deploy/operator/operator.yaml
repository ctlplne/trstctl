apiVersion: v1
kind: ServiceAccount
metadata:
  name: trustctl-operator
  namespace: trustctl-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trustctl-operator
rules:
  - apiGroups: ["trustctl.io"]
    resources: ["trustctlcontrolplanes", "trustctlcontrolplanes/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "secrets", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trustctl-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trustctl-operator
subjects:
  - kind: ServiceAccount
    name: trustctl-operator
    namespace: trustctl-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustctl-operator
  namespace: trustctl-system
  labels:
    app: trustctl-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trustctl-operator
  template:
    metadata:
      labels:
        app: trustctl-operator
    spec:
      serviceAccountName: trustctl-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: ghcr.io/imfeelingtheagi/trustctl-operator:latest
          args: ["--leader-elect"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
