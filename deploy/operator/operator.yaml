# PLANNED — NOT YET DEPLOYABLE (S15.1, OPS-002).
# These manifests describe a CRD-driven operator that is not implemented yet:
# there is no cmd/trustctl-operator and no workflow builds a trustctl-operator
# image, so the `image:` below is intentionally a placeholder and `kubectl apply`
# of this file will ImagePullBackOff. The supported control-plane install today is
# the Helm chart (deploy/helm/trustctl); see docs/limitations.md ("A Kubernetes
# Operator"). This file is kept as the forward-looking RBAC/Deployment shape.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trustctl-operator
  namespace: trustctl-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trustctl-operator
rules:
  - apiGroups: ["trustctl.io"]
    resources: ["trustctlcontrolplanes", "trustctlcontrolplanes/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "secrets", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trustctl-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trustctl-operator
subjects:
  - kind: ServiceAccount
    name: trustctl-operator
    namespace: trustctl-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustctl-operator
  namespace: trustctl-system
  labels:
    app: trustctl-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trustctl-operator
  template:
    metadata:
      labels:
        app: trustctl-operator
    spec:
      serviceAccountName: trustctl-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          # PLACEHOLDER — the trustctl-operator controller and its image do not
          # exist yet (S15.1, OPS-002). Replace with a real built image when the
          # controller ships; until then this manifest is not deployable.
          image: ghcr.io/imfeelingtheagi/trustctl-operator:PLANNED-not-yet-built
          args: ["--leader-elect"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
