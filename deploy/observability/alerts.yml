# Prometheus alerting rules for the trstctl control plane (R2.2).
#
# Load these with `rule_files: ["alerts.yml"]` in prometheus.yml and scrape the
# control plane's /metrics endpoint with a job named "trstctl".
#
# Every trstctl_ metric referenced here is emitted by /metrics — this is asserted
# by internal/observ TestAlertRulesReferenceRealMetrics, so an alert can never
# silently reference a metric the code does not produce.
groups:
  - name: trstctl-availability
    rules:
      - alert: TrstctlDown
        expr: up{job="trstctl"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "trstctl control plane is down"
          description: "Prometheus has not been able to scrape the trstctl /metrics target for 1 minute."

      - alert: TrstctlHighErrorRate
        expr: |
          sum(rate(trstctl_http_requests_total{code=~"5.."}[5m]))
            /
          clamp_min(sum(rate(trstctl_http_requests_total[5m])), 1) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "trstctl 5xx error rate above 5%"
          description: "More than 5% of HTTP responses have been 5xx over the last 5 minutes."

      - alert: TrstctlHighLatencyP99
        expr: |
          histogram_quantile(0.99, sum(rate(trstctl_http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "trstctl p99 request latency above 1s"
          description: "The 99th percentile HTTP request latency has exceeded 1 second over the last 5 minutes."

      - alert: TrstctlEventLogUnderReplicated
        expr: trstctl_event_log_replicas_actual < trstctl_event_log_replicas_desired
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "trstctl event log is under-replicated"
          description: "The source-of-truth JetStream stream has fewer replicas than configured; readiness should be degraded until NATS meets the requested durability."

  - name: trstctl-slo-hot-paths
    rules:
      - record: trstctl:slo_p99_latency_seconds
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(trstctl_http_request_duration_seconds_bucket{route=~"/api/v1/(identities|ca/authorities/.*/issue|workloads/attested-issuance|ssh/attested-user-certs|broker/agent-identities)(/.*)?"}[5m])) by (le)
          )
        labels:
          slo_id: PERF-SLO-001
          hot_path: api.issuance
          route_match: '/api/v1/(identities|ca/authorities/.*/issue|workloads/attested-issuance|ssh/attested-user-certs|broker/agent-identities)(/.*)?'
          slo_p99_seconds: "0.3"

      - record: trstctl:slo_error_ratio:5m
        expr: |
          sum(rate(trstctl_http_requests_total{route=~"/api/v1/(identities|ca/authorities/.*/issue|workloads/attested-issuance|ssh/attested-user-certs|broker/agent-identities)(/.*)?",code=~"5.."}[5m]))
            /
          clamp_min(sum(rate(trstctl_http_requests_total{route=~"/api/v1/(identities|ca/authorities/.*/issue|workloads/attested-issuance|ssh/attested-user-certs|broker/agent-identities)(/.*)?"}[5m])), 1)
        labels:
          slo_id: PERF-SLO-001
          hot_path: api.issuance
          route_match: '/api/v1/(identities|ca/authorities/.*/issue|workloads/attested-issuance|ssh/attested-user-certs|broker/agent-identities)(/.*)?'
          error_budget_ratio: "0.001"

      - record: trstctl:slo_error_ratio:1h
        expr: |
          sum(rate(trstctl_http_requests_total{route=~"/api/v1/(identities|ca/authorities/.*/issue|workloads/attested-issuance|ssh/attested-user-certs|broker/agent-identities)(/.*)?",code=~"5.."}[1h]))
            /
          clamp_min(sum(rate(trstctl_http_requests_total{route=~"/api/v1/(identities|ca/authorities/.*/issue|workloads/attested-issuance|ssh/attested-user-certs|broker/agent-identities)(/.*)?"}[1h])), 1)
        labels:
          slo_id: PERF-SLO-001
          hot_path: api.issuance
          route_match: '/api/v1/(identities|ca/authorities/.*/issue|workloads/attested-issuance|ssh/attested-user-certs|broker/agent-identities)(/.*)?'
          error_budget_ratio: "0.001"

      - alert: TrstctlPerfSLOLatencyPERFSLO001
        expr: trstctl:slo_p99_latency_seconds{slo_id="PERF-SLO-001"} > 0.3
        for: 5m
        labels:
          severity: warning
          slo_id: PERF-SLO-001
          hot_path: api.issuance
          slo_p99_seconds: "0.3"
        annotations:
          summary: "PERF-SLO-001 api.issuance p99 latency is above 300ms"
          description: "The served issuance route family is slower than the committed PERF-SLO-001 p99 latency threshold."

      - alert: TrstctlPerfSLOBurnRatePERFSLO001
        expr: |
          trstctl:slo_error_ratio:5m{slo_id="PERF-SLO-001"} > 0.001 * 14.4
            and
          trstctl:slo_error_ratio:1h{slo_id="PERF-SLO-001"} > 0.001 * 6
        for: 2m
        labels:
          severity: critical
          slo_id: PERF-SLO-001
          hot_path: api.issuance
          error_budget_ratio: "0.001"
          burn_short: "14.4"
          burn_long: "6"
        annotations:
          summary: "PERF-SLO-001 api.issuance error budget is burning fast"
          description: "The served issuance route family is consuming the committed 0.10% error budget at fast-burn rates across 5m and 1h windows."

