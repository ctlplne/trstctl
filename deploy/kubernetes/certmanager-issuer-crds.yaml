apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: issuers.trstctl.com
  labels:
    app.kubernetes.io/name: trstctl-cert-manager-issuer
    app.kubernetes.io/part-of: trstctl
spec:
  group: trstctl.com
  scope: Namespaced
  names:
    kind: Issuer
    plural: issuers
    singular: issuer
    categories: ["cert-manager"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Signer
          type: string
          jsonPath: .spec.signerURL
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                signerURL:
                  type: string
                  description: trstctl served issuance endpoint that receives the CSR.
                caAuthorityID:
                  type: string
                  description: Human-readable trstctl CA authority identifier used by operators and docs.
                profileName:
                  type: string
                  description: Optional trstctl certificate profile name applied by the signer endpoint.
                ttlSeconds:
                  type: integer
                  minimum: 1
                  description: Requested leaf lifetime in seconds when the signer endpoint honors it.
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required: ["type", "status"]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
---
