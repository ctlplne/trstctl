apiVersion: v1
kind: ServiceAccount
metadata:
  name: trstctl-agent
  namespace: trstctl
  labels:
    app.kubernetes.io/name: trstctl-agent
---
# The agent writes TLS Secrets, acts as a cert-manager external issuer, fulfils
# trstctl-native Certificate resources, signs approved native Kubernetes
# CertificateSigningRequests, and distributes public CA trust bundles into
# ConfigMaps. It reads requests and updates only their status. Least privilege —
# no delete, no private key reads, no unrelated resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trstctl-agent
  labels:
    app.kubernetes.io/name: trstctl-agent
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["certificates.k8s.io"]
    resources: ["certificatesigningrequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["certificates.k8s.io"]
    resources: ["certificatesigningrequests/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["trstctl.com"]
    resources: ["issuers", "clusterissuers", "certificates", "trustbundles"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["trstctl.com"]
    resources: ["issuers/status", "clusterissuers/status", "certificates/status", "trustbundles/status"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trstctl-agent
  labels:
    app.kubernetes.io/name: trstctl-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trstctl-agent
subjects:
  - kind: ServiceAccount
    name: trstctl-agent
    namespace: trstctl
