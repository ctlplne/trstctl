# Blessed oapi-codegen configuration for the trstctl Go SDK (PRODUCT-007).
#
# This generates a TYPES-ONLY models file from the pinned OpenAPI contract
# (clients/sdk/openapi.json). It deliberately does NOT generate a client: the
# supported transport surface is the hand-written client.go / resources.go /
# iterator.go (auth, Idempotency-Key, retry/backoff, problem+json, cursor
# iterators), which a generated client cannot express. The generated models are
# an OPTIONAL, drift-checkable mirror of the full schema set for integrators who
# want every component type available, regenerated by `make sdk` via `go run
# github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen` (nothing to install).
#
# The hand-written resources.go keeps its own curated structs for the
# getting-started flow so the SDK builds and tests offline even if this optional
# generation step is skipped; both decode the same wire shapes.
#
# Because oapi-codegen's output imports github.com/oapi-codegen/runtime (which
# would break the SDK's stdlib-only go.mod), the committed
# trstctl/models/models.gen.go ships build-ignored (`//go:build ignore`): it is a
# reference, not a compiled part of the module. Regeneration is opt-in via
# `TRSTCTL_SDK_GO_MODELS=1 make sdk` for forks that accept the extra dependency.
package: trstctlmodels
output: trstctl/models/models.gen.go
generate:
  models: true
  client: false
  embedded-spec: false
output-options:
  skip-prune: true
